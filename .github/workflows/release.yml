name: Auto Build and Release Static Nginx

on:
  push: 
    branches: ["main"]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      nginx_ver: ${{ steps.compare.outputs.nginx_ver }}
    steps:
      - name: Get Latest Nginx Version from Official Site
        id: nginx
        run: |
          VER=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          [ -z "$VER" ] && VER="1.31.0"
          echo "LATEST_VER=$VER" >> $GITHUB_ENV
          echo "nginx_ver=$VER" >> $GITHUB_OUTPUT

      - name: Get Latest Release Tag from GitHub
        id: github
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | grep -oP '"tag_name":\s*"\K[0-9]+\.[0-9]+\.[0-9]+' || echo "none")
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Compare Versions
        id: compare
        run: |
          echo "Nginx 官网最新版本: ${{ env.LATEST_VER }}"
          echo "仓库当前 Release 版本: ${{ env.LATEST_TAG }}"
          
          if [ "${{ env.LATEST_VER }}" = "${{ env.LATEST_TAG }}" ]; then
            echo "✅ 版本一致，无需更新。"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "🚀 检测到新版本！开始构建..."
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "nginx_ver=${{ env.LATEST_VER }}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - arch: armv7
            platform: linux/arm/v7
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'armv7'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Build Script
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}

      - name: Upload Temporary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-static-${{ matrix.arch }}
          path: output/*.tar.gz
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nginx-static-*
          merge-multiple: true

      - name: Fetch and Parse Nginx Changes
        id: parse_nginx_changes
        run: |
          VER="${{ needs.check-version.outputs.nginx_ver }}"
          curl -s https://nginx.org/en/CHANGES -o NGINX_CHANGES_RAW
          tr -d '\r' < NGINX_CHANGES_RAW > NGINX_CHANGES
          CHANGES_CONTENT=$(awk -v ver="$VER" '
            BEGIN { found = 0 }
            $0 ~ "Changes with nginx " ver { found = 1; print; next }
            found && $0 ~ "Changes with nginx " { found = 0; exit }
            found { print }
          ' NGINX_CHANGES)
          if [ -z "$CHANGES_CONTENT" ]; then
             CHANGES_CONTENT="* 暂未在官方 CHANGES 中找到该版本的详细变更，请参考官网最新公告。"
          fi
          echo "nginx_release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.check-version.outputs.nginx_ver }}"
          
          cat << 'EOF' > release_body.md
          ## Nginx 静态链接版
          
          - **Nginx 官方版本**: ${{ needs.check-version.outputs.nginx_ver }}
          - **包含架构**: amd64 (x86_64), arm64 (aarch64), armv7
          - **功能内置**: 解压后直接运行 `./start.sh` 即可一键启动。
          
          ---
          
          ### 📜 Nginx 官方变更日志 (${{ needs.check-version.outputs.nginx_ver }})
          ```text
          ${{ steps.parse_nginx_changes.outputs.nginx_release_notes }}
          ```
          EOF

          if gh release view "$VER" >/dev/null 2>&1; then
            echo "🔄 检测到 Tag $VER 已存在！正在执行覆盖更新流程..."
            
            gh release edit "$VER" --notes-file release_body.md --draft=false
            
            gh release upload "$VER" dist/*.tar.gz --clobber
            
            echo "✅ 资产与文本已成功覆盖更新，未影响其他历史版本。"
          else
            echo "🚀 Tag $VER 不存在，正在首次创建公开 Release..."
            
            gh release create "$VER" dist/*.tar.gz \
              --title "Nginx Static $VER" \
              --notes-file release_body.md
              
            echo "🎉 首次发版成功！"
          fi