name: Build and Release Static Nginx

on:
  push:
    branches:
      - main # 或者你开发的分支
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Build Script
        id: build_step
        run: |
          chmod +x build.sh
          ./build.sh
          # 即使脚本没写 GITHUB_ENV，我们也可以在这里二次确认提取
          # 假设文件名是 nginx-1.31.0.tar.gz，我们提取出 1.31.0
          VER=$(ls output/amd64/nginx-*.tar.gz | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "DETECTED_VER=$VER" >> $GITHUB_ENV

      - name: Prepare Artifacts
        run: |
          mkdir -p dist
          # 使用通配符移动并重命名，方便发布
          cp output/amd64/nginx-${{ env.DETECTED_VER }}.tar.gz dist/nginx-${{ env.DETECTED_VER }}-static-amd64.tar.gz
          cp output/arm64/nginx-${{ env.DETECTED_VER }}.tar.gz dist/nginx-${{ env.DETECTED_VER }}-static-arm64.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 自动使用提取的版本号作为 Tag 和标题
          tag_name: v${{ env.DETECTED_VER }}
          name: Nginx Static Release v${{ env.DETECTED_VER }}
          files: |
            dist/nginx-${{ env.DETECTED_VER }}-static-amd64.tar.gz
            dist/nginx-${{ env.DETECTED_VER }}-static-arm64.tar.gz
          body: |
            ## 自动构建完成
            - **Nginx 版本**: `${{ env.DETECTED_VER }}`
            - **构建架构**: x86_64 (amd64), aarch64 (arm64)
            - **特性**: 纯静态链接，内置 SSL/V2/Gzip_Static
            - **构建时间**: ${{ github.event.head_commit.timestamp || 'Manual Trigger' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}