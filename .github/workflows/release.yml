name: Build and Release Static Nginx

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # 阶段一：并行构建
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64' # 只有 arm64 需要 QEMU 模拟
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Build Script
        run: |
          chmod +x build.sh
          # 将 matrix 中的 arch 作为参数传给脚本
          ./build.sh ${{ matrix.arch }}
          
          # 提取版本号输出给当前 Job 记录
          VER=$(ls output/nginx-*-portable-${{ matrix.arch }}.tar.gz | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "JOB_VER=$VER" >> $GITHUB_ENV

      - name: Upload Temporary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-tarball-${{ matrix.arch }}
          path: output/*.tar.gz
          retention-days: 1

  # 阶段二：汇总并发布 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 再次获取最新版本号，用来做 Tag 命名
      - name: Get Version Name
        run: |
          VER=$(curl -s https://nginx.org/en/download.html | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          [ -z "$VER" ] && VER="1.31.0"
          echo "RELEASE_VER=$VER" >> $GITHUB_ENV

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nginx-tarball-*
          merge-multiple: true # 把不同 job 的文件融到同一个 dist 目录下

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VER }}
          name: Nginx Static Portable v${{ env.RELEASE_VER }}
          files: dist/*.tar.gz
          body: |
            ## Nginx 绿色多架构静态链接版
            - **Nginx 官方版本**: `${{ env.RELEASE_VER }}`
            - **构建方式**: GitHub Actions Matrix 矩阵并行构建
            - **包含架构**: amd64 (x86_64), arm64 (aarch64)
            - **内置便捷脚本**: 解压后直接运行 `./start.sh` 即可一键拉起工作目录。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}